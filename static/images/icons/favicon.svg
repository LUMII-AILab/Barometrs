<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a2332"/>
  
  <g transform="translate(0, -4)">
    <!-- Gauge arc: blue → teal → amber → red -->
    <path d="M 12,40 A 22,22 0 0,1 19.5,21.5" fill="none" stroke="#378ADD" stroke-width="5" stroke-linecap="round"/>
    <path d="M 19.5,21.5 A 22,22 0 0,1 32,18" fill="none" stroke="#5DCAA5" stroke-width="5" stroke-linecap="round"/>
    <path d="M 32,18 A 22,22 0 0,1 44.5,21.5" fill="none" stroke="#EF9F27" stroke-width="5" stroke-linecap="round"/>
    <path d="M 44.5,21.5 A 22,22 0 0,1 52,40" fill="none" stroke="#E24B4A" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Needle pointing into amber/red zone (~65%) -->
    <line x1="32" y1="40" x2="44" y2="23" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Center pivot -->
    <circle cx="32" cy="40" r="3.5" fill="#f0f0f0"/>
    
    <!-- Subtle tick marks at ends -->
    <line x1="13" y1="37" x2="16" y2="36" stroke="#f0f0f0" stroke-width="0.8" opacity="0.5"/>
    <line x1="51" y1="37" x2="48" y2="36" stroke="#f0f0f0" stroke-width="0.8" opacity="0.5"/>
    
    <!-- "B2" text below gauge -->
    <text x="32" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#f0f0f0" letter-spacing="0.5">B2</text>
  </g>
</svg>
